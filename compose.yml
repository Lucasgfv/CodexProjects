services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autcompany
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autcompany"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: dependencies
    command: ["sh", "-c", "pnpm install --frozen-lockfile && pnpm exec prisma generate && pnpm db:deploy"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/autcompany?schema=public
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: dependencies
    command: ["sh", "-c", "rm -rf /app/.next/* && exec pnpm dev --hostname 0.0.0.0"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/autcompany?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-desenvolvimento-local-altere-antes-de-usar-em-rede-2026}
      AUTH_URL: http://127.0.0.1:3000
      AUTH_TRUST_HOST: "true"
      WATCHPACK_POLLING: "true"
      CI: "true"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    depends_on:
      migrate:
        condition: service_completed_successfully

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autcompany.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  app_node_modules:
  app_next:
  pgadmin_data:
