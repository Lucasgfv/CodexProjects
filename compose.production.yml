services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autcompany
      POSTGRES_USER: autcompany
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
    volumes:
      - postgres_production:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autcompany -d autcompany"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["pnpm", "db:deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL com senha codificada para URL e host db}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL com senha codificada para URL e host db}
      AUTH_SECRET: ${AUTH_SECRET:?Defina AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      AUTCOMPANY_HOST: ${AUTCOMPANY_HOST:?Defina AUTCOMPANY_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_production:
  caddy_data:
  caddy_config:
